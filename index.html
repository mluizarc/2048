<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header">
    <h1>2048</h1>
    <div id="score-container">Score: <span id="score">0</span></div>
    <button id="new-game">New Game</button>
  </div>

  <div id="theme-picker">
    <button class="theme-btn active" data-theme="green"  title="Green"></button>
    <button class="theme-btn"        data-theme="rose"   title="Rose"></button>
    <button class="theme-btn"        data-theme="lilac"  title="Lilac"></button>
    <button class="theme-btn"        data-theme="blue"   title="Blue"></button>
  </div>

  <div id="grid-container"></div>

  <div id="overlay" class="hidden">
    <p id="overlay-message"></p>
    <button id="continue">Continue</button>
    <button id="restart">Play Again</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
